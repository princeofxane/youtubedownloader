name: Build and Push Docker Image

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USER }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/${{ vars.BUILD_PLATFORM || 'amd64' }}
          push: true
          tags: |
            ghcr.io/princeofxane/youtubedownloader:${{ github.run_number }}
            ghcr.io/princeofxane/youtubedownloader:${{ github.run_number }}-${{ github.sha }}
            ghcr.io/princeofxane/youtubedownloader:latest