syntax = "proto3";

package yt_downloader;

option go_package = "pkg/grpc_gen";

message HelloRequest {
    string name = 1;
}

message HelloResponse {
    string message = 1;
}


message DownloadRequest {
    string videoUrl = 1;
    string videQuality = 2;
}

message DownloadResponse {
    string message = 1;
}

service YTDownloadService {
    rpc SayHello(HelloRequest) returns (HelloResponse);
    rpc YTDownload(DownloadRequest) returns (DownloadResponse);
}